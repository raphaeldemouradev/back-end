<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="stylesheet" href="/perfil.css">
</head>
<body>
    <header>
        <button class="btn-menu" id="btn-edit">Edit ✏️</button>
        <button class="btn-menu" id="btn-delete">Delet 🗑️</button>
    </header>
    <main>
        <section class="profile">
            <div class="circle"></div>
            <div class="nome-user"></div>
        </section>
        <section class="profile">
            <p style="padding-right: 5px;">Email: </p>
            <div class="email-user"></div>
        </section>
    </main>
    <footer>
        <a href="/home" class="navbar">Home</a>
        <a href="/perfil" class="navbar">Perfil</a>
    </footer>

    <script>
        async function getApi() {
            let usuarioAtualId = null

            try {

                const resposta = await fetch('http://localhost:3000/api/users')
                const dados = await resposta.json()
                console.log(dados)

                const nome = document.getElementsByClassName('nome-user')[0]
                const email = document.getElementsByClassName('email-user')[0]
                if (dados.length > 0) {
                    const ultimoUser = dados[dados.length - 1]

                    usuarioAtualId = ultimoUser.id;

                    nome.textContent = ultimoUser.name
                    email.textContent = ultimoUser.email
                } else {
                    nome.textContent = "Erro"
                    email.textContent = "Erro"
                }

                // Edit perfil
                const popUp = document.getElementById('customPopup')
                const btnCancel = document.getElementById('btnPopCancel')
                const btnEdit = document.getElementById('btn-edit')
                btnCancel.onclick = () => {
                    popUp.classList.add('hidden')
                }
                popUp.onclick = (e) => {
                    if (e.target === popUp)
                    popUp.classList.add('hidden')
                }

                btnEdit.onclick = () => {
                    popUp.classList.remove('hidden')
                }
 
                const btnSave = document.getElementById('btnPopSave')
                btnSave.addEventListener('click', async () => {
                    console.log("Editar perfil")
                    if (!usuarioAtualId) {
                        alert("ID do usuario não listado")
                        return
                    }
                    
                    try {

                        const novoNome = document.getElementById('popName').value;
                        const novoEmail = document.getElementById('popEmail').value;
                        
                        const resposta = await fetch(`http://localhost:3000/api/users/${usuarioAtualId}`, {
                            method: "PUT",
                            headers: {"Content-Type": "application/json"},
                            body: JSON.stringify({
                                name: novoNome,
                                email: novoEmail,
                            })
                        })
                    
                        if (resposta.ok) {
                            console.log("Perfil atualizado com sucesso")
                            const dadosAtualizado = await resposta.json()

                            popUp.classList.add('hidden');
                            window.location.reload();
                        } else {
                            console.log("Erro no servidor ao atualizar o perfil")
                        }
                        
                    } catch (error) {
                        console.error('Erro de requisição ao atualizar', status.error)
                    }
                })

                // Deletar user
                const btnDelete = document.getElementById('btn-delete')

                btnDelete.addEventListener('click', async () => {
                    console.log("Deletar perfil")

                    if (confirm("Tem certeza que deseja deletar o perfil?")) {
                        try {
                            const resposta = await fetch(`http://localhost:3000/api/users/${dados[0].id}`, {
                                method: "DELETE"
                            })

                            if (resposta.ok) {
                                console.log("Perfil deletado com sucesso")
                                window.location.href = "/"
                            } else {
                                console.log("Erro no servidor ao deletar o perfil")
                            }
                        } catch (error) {
                            console.error('Erro de requisição', status.error)
                        }
                    } else {
                        console.log("Ação de deletar perfil cancelada")
                    }
                })

            } catch (error) {
                console.error('Erro de requisição', status.error)
            }
        }
        getApi()
    </script>

    <div class="popup-overley hidden" id="customPopup">
        <div class="popup-card">
            <div class="popup-header">
                <h3>Editar Perfil</h3>
            </div>


            <div class="popup-body">
                <div class="input-field">
                    <label for="popName">Nome:</label>
                    <input type="text" id="popName" placeholder="Digite novo nome...">
                </div>
                <div class="input-field">
                    <label for="popEmail">Email:</label>
                    <input type="email" id="popEmail" placeholder="Digite o Email">
                </div>
            </div>

            <div class="popup-footer">
                <button class="btn-secondary" id="btnPopCancel">Cancelar</button>
                <button class="btn-primary" id="btnPopSave">Atualizar</button>
            </div>
        </div>
    </div>
</body>
</html>
