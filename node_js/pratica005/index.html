<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="container">
    <h2 class="form-title">Login</h2>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="iemail" name="email" required>
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="ipass" name="password" required>
      </div>
      <button type="submit" class="btn">Entrar</button>
    </form>

    <a class="toggle-link" href="http://localhost:3000/cadastro">Não tem conta? Cadastre-se</a>
  </div>

  <script>
    const form = document.getElementById('loginForm')
    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const email = document.getElementById('iemail').value;
      const pass = document.getElementById('ipass').value;

      try {
        const response = await fetch('http://localhost:3000/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json'},
          body: JSON.stringify({ email, pass }),
        });

        const dados = await response.json()

        if (response.ok && dados.token) {
          localStorage.setItem('userToken', dados.token)
          window.location.href = '/home.html';
        } else {
          alert(dados.error || "Email ou senha incorretos!");
        }

      } catch (error) {
        console.error("Erro ao conectar com servidor:", error)
      }
    })
  </script>
</body>
</html>
